name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-demo-brain:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.12"]
        domain: [specialty-coffee, b2b-discovery, runbook-basics]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Verify (${{ matrix.domain }})
        run: python tools/bin/verify.py --domain ${{ matrix.domain }} --brain-root examples/demo-brain

      - name: Classify (${{ matrix.domain }})
        run: python tools/bin/classify.py --domain ${{ matrix.domain }} --summary --brain-root examples/demo-brain

      - name: Brain bootstrap (${{ matrix.domain }})
        run: python tools/bin/brain.py bootstrap ${{ matrix.domain }} --brain-root examples/demo-brain

      - name: Brain expand (${{ matrix.domain }})
        run: |
          QUERY=grind
          if [ "${{ matrix.domain }}" = "b2b-discovery" ]; then QUERY=qualify; fi
          if [ "${{ matrix.domain }}" = "runbook-basics" ]; then QUERY=triage; fi
          python tools/bin/brain.py expand ${{ matrix.domain }} \
            --query "$QUERY" \
            --max-tokens 4000 \
            --max-tier 3 \
            --brain-root examples/demo-brain

      - name: Brain search (${{ matrix.domain }})
        run: |
          QUERY=grind
          if [ "${{ matrix.domain }}" = "b2b-discovery" ]; then QUERY=qualify; fi
          if [ "${{ matrix.domain }}" = "runbook-basics" ]; then QUERY=triage; fi
          python tools/bin/brain.py search ${{ matrix.domain }} "$QUERY" --brain-root examples/demo-brain

      - name: Brain get (${{ matrix.domain }})
        run: |
          if [ "${{ matrix.domain }}" = "specialty-coffee" ]; then
            python tools/bin/brain.py get specialty-coffee knowledge/fundamentals/dialing-in-basics.md --brain-root examples/demo-brain
          elif [ "${{ matrix.domain }}" = "b2b-discovery" ]; then
            python tools/bin/brain.py get b2b-discovery knowledge/fundamentals/icp-basics.md --brain-root examples/demo-brain
          else
            python tools/bin/brain.py get runbook-basics examples/incident-triage-checklist.md --brain-root examples/demo-brain
          fi

      - name: Brain doctor
        run: python tools/bin/brain.py doctor --brain-root examples/demo-brain

      - name: Freshness audit (${{ matrix.domain }})
        run: python tools/bin/brain.py freshness --domain ${{ matrix.domain }} --brain-root examples/demo-brain

  onboarding-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Brain try (zero-config demo)
        run: python tools/bin/brain.py try

      - name: Brain welcome (no subcommand)
        run: python tools/bin/brain.py | head -5
